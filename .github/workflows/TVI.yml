name: Update streams
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  Update-streams:
    runs-on: ubuntu-latest
    steps:
    
      - name: checkout
        uses: actions/checkout@v5

      - name: update streams
        run: cd m3u8 && sh TVI.sh

      - name: setup git config
        run: |
          git config user.name "🚀 HAL 9000"
          git config user.email "<>"

      - name: commit
        run: |
          git pull
          cd m3u8 && git add *.m3u8
          git commit -m "Update streams"
          git push origin main
